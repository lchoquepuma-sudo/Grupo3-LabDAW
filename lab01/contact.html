<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contacto</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header>
  <h1>Contacto</h1>
  <nav>
    <a href="index.html">Inicio</a>
    <a href="webStandards.html">Estándar Web</a>
    <a href="contact.html">Contacto</a>
  </nav>
</header>

<div class="contenedor">

  <section class="contacto">
    <h2>Contáctanos</h2>
    <p>
      Si deseas comunicarte con nuestro equipo, completa el siguiente formulario.
      Estaremos encantados de responderte.
    </p>

    <form>

      <div class="grupo-campo">
        <label for="nombre">Nombre</label>
        <input id="nombre" type="text" placeholder="Ingresa tu nombre" required>
      </div>

      <div class="grupo-campo">
        <label for="correo">Correo electrónico</label>
        <input id="correo" type="email" placeholder="ejemplo@email.com" required>
      </div>

      <div class="grupo-campo">
        <label for="mensaje">Mensaje</label>
        <textarea id="mensaje" rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>
      </div>

      <button type="submit">Enviar mensaje</button>

    </form>
  </section>

</div>

<footer>
  <p>© 2026 - Grupo 4 | Developers</p>
</footer>

</body>
</html>
